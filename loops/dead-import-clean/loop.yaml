name: dead-import-clean
description: "Drive an agent until a Python module imports nothing it doesn't use.\
  \ The gate is `seed/check_imports.py` \u2014 a tiny, dependency-free, pure-standard-library\
  \ checker (built on `ast`) shipped WITH the loop: no network, no pip-installed linter,\
  \ no key. Ships a real `module.py` with working order-total/most-common-item/to_json\
  \ logic plus two genuinely dead imports (`os`, `sys`) left over from a refactor.\n"
pattern: orchestrator-workers
role:
- backend
- quality
rung: L1
spec: PROMPT.md
forbid:
- seed/check_imports.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_imports.py seed/module.py
bounds: bounds.yaml
memory: STATE.md
