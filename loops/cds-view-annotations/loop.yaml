name: cds-view-annotations
description: "Drive an agent until a SAP Core Data Services (CDS) view DDL source\
  \ declares its required annotations: @AccessControl.authorizationCheck, @EndUserText.label,\
  \ and @Metadata.allowExtensions. The gate is `seed/check_cds.py` \u2014 a tiny,\
  \ dependency-free, pure-standard-library checker (simple substring checks) shipped\
  \ WITH the loop, so it runs anywhere Python does: no network, no SAP ABAP Development\
  \ Tools (ADT) connection, no key. Ships a real zcds_view.txt missing the authorization\
  \ check and end-user label annotations \u2014 a security and usability gap that\
  \ would fail a customer ABAP release-quality guideline. The agent must fix the VIEW,\
  \ never the checker.\n"
pattern: orchestrator-workers
role:
- enterprise
- erp
rung: L2
spec: PROMPT.md
forbid:
- seed/check_cds.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_cds.py seed/zcds_view.txt
bounds: bounds.yaml
memory: STATE.md
