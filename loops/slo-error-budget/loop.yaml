name: slo-error-budget
description: 'Drive an agent until a failing pytest passes. Reproduces a common SRE/operations
  bug: an SLO''s reported error-budget remainder doesn''t match what the target, window,
  and downtime actually allow, understating (or overstating) how much downtime is
  left before the SLO breaches. `seed/test_error_budget.py` is the ground truth: it
  recomputes the correct value from the other three fields and asserts `slo.json`
  reports exactly that.

  '
pattern: orchestrator-workers
role:
- operations
- engineering
rung: L1
forbid:
- seed/test_*.py
runner:
  default: stub
gate:
  kind: pytest
  run: pytest -q
bounds: bounds.yaml
memory: STATE.md
spec: PROMPT.md
