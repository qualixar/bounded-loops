name: type-annotations-present
description: "Drive an agent until every public top-level function in a Python module\
  \ fully annotates its parameters and return type. The gate is `seed/check_types.py`\
  \ \u2014 a tiny, dependency-free, pure-standard-library checker (built on `ast`)\
  \ shipped WITH the loop: no network, no mypy/pyright install, no key. Ships a real\
  \ `api.py` where `create_user`'s `name` parameter has no annotation \u2014 an undocumented\
  \ contract on a public function.\n"
pattern: parallelization
role:
- backend
- quality
rung: L1
spec: PROMPT.md
forbid:
- seed/check_types.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_types.py seed/api.py
bounds: bounds.yaml
memory: STATE.md
