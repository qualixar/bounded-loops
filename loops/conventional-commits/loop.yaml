name: conventional-commits
description: "Drive an agent until every commit subject in a list conforms to Conventional\
  \ Commits (`type(scope): description`). The gate is `seed/check_commits.py` \u2014\
  \ a tiny, dependency-free, pure-standard-library checker shipped WITH the loop,\
  \ so it runs anywhere Python does: no network, no key. Ships a real `commits.txt`\
  \ with two malformed subjects (a free-text subject with no type, and a \"WIP ...\"\
  \ subject) that would break changelog generation and semantic-release version bumps.\
  \ The agent must fix the SUBJECTS, never edit the checker to force a pass.\n"
pattern: orchestrator-workers
role:
- operations
- engineering
rung: L1
spec: PROMPT.md
forbid:
- seed/check_commits.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_commits.py seed/commits.txt
bounds: bounds.yaml
memory: STATE.md
