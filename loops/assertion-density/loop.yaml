# loops/assertion-density/loop.yaml
name: assertion-density
description: >
  Drive an agent until every `test_*` function in a Python test file
  contains at least one `assert` statement. The gate is
  `seed/check_assertions.py` — a tiny, dependency-free, pure-standard-library
  checker (uses `ast`) shipped WITH the loop, so it runs anywhere Python
  does: no network, no key. Ships a real `sample_tests.py` where
  `test_login_flow` calls `login(...)` and prints the result but never
  asserts anything, so it passes even if `login` is completely broken. The
  agent must add a real assertion, never a tautology, and never weaken the
  checker to force a pass.
pattern: evaluator-optimizer
role:
  - testing
rung: L1
spec: PROMPT.md
# The gate's verification anchor. The engine refuses any runner write to a
# path matching this glob, so the agent (or a community cassette) cannot
# neuter the checker to fake a green gate.
forbid:
  - "seed/check_assertions.py"
runner:
  default: stub
gate:
  kind: command
  run: "python3 seed/check_assertions.py seed/sample_tests.py"
bounds: bounds.yaml
memory: STATE.md
