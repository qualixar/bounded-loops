name: oncall-coverage
description: "Drive an agent until an on-call schedule covers every hour of its rotation\
  \ period exactly once. The gate is `seed/check_coverage.py` \u2014 a tiny, dependency-free,\
  \ pure-standard-library checker shipped WITH the loop, so it runs anywhere Python\
  \ does: no network, no key. Ships a real schedule.json with a 2-hour gap (14:00-16:00)\
  \ where nobody is on call \u2014 a schedule that looks fine in a spreadsheet but\
  \ leaves an incident unpaged. The agent must fix the SCHEDULE, never edit the checker\
  \ to force a pass.\n"
pattern: orchestrator-workers
role:
- operations
rung: L1
spec: PROMPT.md
forbid:
- seed/check_coverage.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_coverage.py seed/schedule.json
bounds: bounds.yaml
memory: STATE.md
