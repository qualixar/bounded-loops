name: bapi-payload-contract
description: "Drive an agent until a BAPI_MATERIAL_SAVEDATA-style JSON payload conforms\
  \ to its contract. Demonstrates the JsonSchemaGate end to end: real gate FAIL on\
  \ a broken output.json (HEADDATA missing MATL_TYPE), then real gate PASS after the\
  \ agent corrects it against schema.json. Keyless: no network, no SAP RFC/BAPI connection,\
  \ no key \u2014 the gate is pure JSON Schema validation.\n"
pattern: prompt-chaining
role:
- enterprise
- erp
rung: L2
spec: PROMPT.md
runner:
  default: stub
gate:
  kind: jsonschema
bounds: bounds.yaml
memory: STATE.md
