# loops/crewai-example/loop.yaml
name: crewai-example
description: >
  Wires an existing CrewAI crew into bounded-loops. NOT a keyless demo —
  requires `pip install crewai`. Shows the PythonCallableRunner contract
  applied to a real production agent framework.
pattern: evaluator-optimizer
role: [backend, engineering]
rung: L1
runner:
  default: python_callable
  module_path: loops.crewai-example.glue
  function_name: run_turn
gate:
  kind: pytest
  run: "pytest -q"
bounds: bounds.yaml
