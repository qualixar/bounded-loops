name: crewai-example
description: "Wires an existing CrewAI crew into bounded-loops. NOT a keyless demo\
  \ \u2014 requires `pip install crewai`. Shows the PythonCallableRunner contract\
  \ applied to a real production agent framework.\n"
pattern: agents
role:
- backend
- engineering
rung: L1
runner:
  default: python_callable
  module_path: loops.crewai-example.glue
  function_name: run_turn
gate:
  kind: pytest
  run: pytest -q
bounds: bounds.yaml
