name: alert-runbook-link
description: "Drive an agent until every alert definition links to a non-empty runbook\
  \ URL. The gate is `seed/check_alerts.py` \u2014 a tiny, dependency-free, pure-standard-library\
  \ checker shipped WITH the loop, so it runs anywhere Python does: no network, no\
  \ key. Ships a real `alerts.json` where one of four alerts has an empty `runbook_url`\
  \ \u2014 an alert that fires with zero context for whoever is paged. The agent must\
  \ fix the ALERT DEFINITION, never edit the checker to force a pass.\n"
pattern: routing
role:
- operations
rung: L1
spec: PROMPT.md
forbid:
- seed/check_alerts.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_alerts.py seed/alerts.json
bounds: bounds.yaml
memory: STATE.md
