name: test-naming-contract
description: "Drive an agent until every test-like function in a Python test file\
  \ is named `test_*` so a pytest-style runner actually collects it. The gate is `seed/check_test_names.py`\
  \ \u2014 a tiny, dependency-free, pure-standard-library checker (uses `ast`) shipped\
  \ WITH the loop, so it runs anywhere Python does: no network, no key. Ships a real\
  \ `sample_tests.py` where `check_addition` is clearly a test (asserts `add(2, 2)\
  \ == 4`) but is misnamed, so it silently never runs under a normal pytest collection\
  \ rule. The agent must rename the function in place, never delete it or weaken the\
  \ checker to force a pass.\n"
pattern: orchestrator-workers
role:
- testing
rung: L1
spec: PROMPT.md
forbid:
- seed/check_test_names.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_test_names.py seed/sample_tests.py
bounds: bounds.yaml
memory: STATE.md
