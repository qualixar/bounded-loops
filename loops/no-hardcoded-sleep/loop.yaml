name: no-hardcoded-sleep
description: "Drive an agent until no test contains a hardcoded `time.sleep(...)`\
  \ call. The gate is `seed/check_sleep.py` \u2014 a tiny, dependency-free, pure-standard-library\
  \ checker (uses `ast`) shipped WITH the loop, so it runs anywhere Python does: no\
  \ network, no key. Ships a real `sample_tests.py` where `test_worker_finishes` sleeps\
  \ for a guessed 5 seconds instead of polling a real completion signal \u2014 the\
  \ classic flaky-and-slow anti-pattern. The agent must replace the sleep with a real\
  \ poll on the already-available `worker_is_done` helper, never weaken the checker\
  \ to force a pass.\n"
pattern: orchestrator-workers
role:
- testing
rung: L1
spec: PROMPT.md
forbid:
- seed/check_sleep.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_sleep.py seed/sample_tests.py
bounds: bounds.yaml
memory: STATE.md
