name: adk-example
description: "Wires an existing Google Agent Development Kit (ADK) LoopAgent/Runner\
  \ into bounded-loops, per this repo's own frozen vocabulary (LoopAgent(max_iterations/escalate,\
  \ deterministic)). NOT a keyless demo \u2014 requires `pip install google-adk`.\
  \ Shows the PythonCallableRunner contract applied to a real production agent framework.\n"
pattern: agents
role:
- backend
- engineering
rung: L1
runner:
  default: python_callable
  module_path: loops.adk-example.glue
  function_name: run_turn
gate:
  kind: pytest
  run: pytest -q
bounds: bounds.yaml
