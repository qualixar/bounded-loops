name: openapi-schema-valid
description: "Drive an agent until an OpenAPI 3 document satisfies the structural\
  \ minimum every downstream tool (codegen, docs, gateways) assumes: a top-level `openapi`\
  \ version, `info.title`/`info.version`, and every operation under `paths` declaring\
  \ a non-empty `responses` object. The gate is `seed/check_openapi.py` \u2014 a tiny,\
  \ dependency-free, pure-standard-library checker shipped WITH the loop: no network,\
  \ no OpenAPI validator library, no key. Ships a real `openapi.json` where the `POST\
  \ /widgets` operation has no `responses` at all \u2014 an undocumented contract\
  \ with no defined outcome.\n"
pattern: orchestrator-workers
role:
- backend
- api
rung: L1
spec: PROMPT.md
forbid:
- seed/check_openapi.py
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_openapi.py seed/openapi.json
bounds: bounds.yaml
memory: STATE.md
