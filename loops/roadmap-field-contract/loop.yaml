# loops/roadmap-field-contract/loop.yaml
name: roadmap-field-contract
description: >
  Drive an agent until a product roadmap item conforms to its field
  contract. Demonstrates the JsonSchemaGate end to end: real gate
  FAIL on a broken output.json (missing required `owner` field + invalid
  `quarter` enum value "Q5"), then real gate PASS after the agent corrects
  it against schema.json.
pattern: evaluator-optimizer
role:
  - business
rung: L1
spec: PROMPT.md
runner:
  default: stub
gate:
  kind: jsonschema
bounds: bounds.yaml
memory: STATE.md
