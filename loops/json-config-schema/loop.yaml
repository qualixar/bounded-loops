name: json-config-schema
description: 'Drive an agent until a service''s JSON runtime config conforms to its
  contract. Demonstrates the JsonSchemaGate end to end: real gate FAIL on a broken
  output.json (port as a string instead of an integer, log_level missing entirely),
  then real gate PASS after the agent corrects it against schema.json.

  '
pattern: parallelization
role:
- backend
- api
rung: L1
spec: PROMPT.md
runner:
  default: stub
gate:
  kind: composite
  mode: all
  gates:
  - kind: command
    run: python3 -m json.tool output.json
  - kind: jsonschema
    schema: schema.json
bounds: bounds.yaml
memory: STATE.md
