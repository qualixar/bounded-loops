name: claim-source-mapping
description: "Drive an agent until every inline citation marker `[S#]` in a research\
  \ article resolves to a real source id in a trusted source list. The gate is `seed/check_claims.py`\
  \ \u2014 a tiny, dependency-free, pure-standard-library checker shipped WITH the\
  \ loop, so it runs anywhere Python does: no network, no external tool, no key. Ships\
  \ a real article.md that cites a mis-numbered source (`[S3]`, which does not exist\
  \ \u2014 the real supporting source is `[S2]`) \u2014 the exact \"claim-source drift\"\
  \ shape common in AI-assisted research writing. The source list is ground truth:\
  \ the agent must fix the ARTICLE, never edit the source list or the checker to force\
  \ a pass.\n"
pattern: routing
role:
- research
rung: L1
spec: PROMPT.md
forbid:
- seed/check_claims.py
- seed/sources.json
runner:
  default: stub
gate:
  kind: command
  run: python3 seed/check_claims.py seed/article.md seed/sources.json
bounds: bounds.yaml
memory: STATE.md
