name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clean-room:
    name: clean-room / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build and release-test tools
        run: python -m pip install build pytest pyyaml
      - name: Verify README and package contracts
        run: python -m pytest -q tests/release/test_package_contract.py
      - name: Verify documented loop output
        run: python scripts/verify_readme_outputs.py
      - name: Verify wheel in a clean environment
        run: python scripts/verify_clean_room.py

  core:
    name: core tests / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp]"
      - name: Run full suite
        run: pytest -q --ignore=tests/release
      - name: Audit loop catalog
        run: python -m bounded_loops.cli audit-loops --json

  optional-python-gates:
    name: optional Python gate E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and Python gate tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install semgrep great_expectations
      - name: Run optional Python gate E2E tests
        run: pytest -q tests/release/test_optional_external_e2e.py -k "semgrep or great_expectations"

  optional-node-gates:
    name: optional Node gate E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and promptfoo
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          npm install -g promptfoo
      - name: Test npm launcher version parity
        working-directory: npm
        run: npm test
      - name: Run optional promptfoo E2E test
        run: pytest -q tests/release/test_optional_external_e2e.py -k promptfoo

  optional-security-gates:
    name: optional security gate E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - uses: aquasecurity/setup-trivy@v0.3.1
      - name: Install package and gitleaks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run optional security gate E2E tests
        run: pytest -q tests/release/test_optional_external_e2e.py -k "gitleaks or trivy"

  optional-sandbox-runners:
    name: optional Docker/worktree E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run sandbox runner E2E tests
        run: pytest -q tests/release/test_optional_external_e2e.py -k "docker_runner_e2e or worktree_runner_e2e"
